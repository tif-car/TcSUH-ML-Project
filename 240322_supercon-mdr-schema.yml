descriptions:
- description: "MDR SuperCon Datasheet is a re-edited datasheet of SuperCon, a superconductivity database that was originally published as the MatNavi database. A DOI will be assigned for each update to manage the version. When using the data and publishing the results, please follow the MDR terms of use and properly indicate the source corresponding to the version:
(Example of statement) This study used the MDR SuperCon Datasheet (https://doi.org/10.48505/nims.4487), a numerical data sheet for superconducting materials, which is made public by the National Institute for Materials Science (NIMS).

Readme for this datasheet is available at https://doi.org/10.48505/nims.4488. Latest version of this datasheet may be available at https://doi.org/10.48505/nims.3739."

